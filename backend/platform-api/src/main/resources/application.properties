spring.application.name=platform-api
platform.data-root=./data
platform.skills-root=./skills
platform.extensions-config-path=./extensions.json
platform.dev-user-id=dev-user
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
mybatis-plus.mapper-locations=classpath*:mapper/mybatis-plus/**/*.xml
platform.async.mode=${PLATFORM_ASYNC_MODE:local}
platform.async.rocketmq.name-server=${ROCKETMQ_NAME_SERVER:127.0.0.1:9876}
platform.async.rocketmq.producer-group=${ROCKETMQ_PRODUCER_GROUP:platform-producer}
platform.async.rocketmq.task-topic=${ROCKETMQ_TASK_TOPIC:platform_tasks_dispatch}
platform.async.rocketmq.task-consumer-group=${ROCKETMQ_TASK_CONSUMER_GROUP:platform-task-consumer}
platform.async.rocketmq.memory-topic=${ROCKETMQ_MEMORY_TOPIC:platform_memory_events}
platform.async.rocketmq.memory-consumer-group=${ROCKETMQ_MEMORY_CONSUMER_GROUP:platform-memory-consumer}
platform.async.rocketmq.long-term-memory-topic=${ROCKETMQ_LONG_TERM_MEMORY_TOPIC:platform_memory_long_term_jobs}
platform.async.rocketmq.long-term-memory-consumer-group=${ROCKETMQ_LONG_TERM_MEMORY_CONSUMER_GROUP:platform-long-term-memory-consumer}
platform.memory.short-term.window-size=${PLATFORM_MEMORY_WINDOW_SIZE:20}
platform.memory.short-term.read-model-async=${PLATFORM_MEMORY_READ_MODEL_ASYNC:true}
platform.memory.short-term.projector-debounce-ms=${PLATFORM_MEMORY_PROJECTOR_DEBOUNCE_MS:1000}
platform.memory.short-term.summary.enabled=${PLATFORM_MEMORY_SUMMARY_ENABLED:true}
platform.memory.short-term.summary.provider=${PLATFORM_MEMORY_SUMMARY_PROVIDER:gemini}
platform.memory.short-term.summary.model=${PLATFORM_MEMORY_SUMMARY_MODEL:gemini-3-flash-preview}
platform.memory.short-term.summary.max-messages-per-chunk=${PLATFORM_MEMORY_SUMMARY_MAX_MESSAGES_PER_CHUNK:12}
platform.memory.short-term.summary.max-chars-per-chunk=${PLATFORM_MEMORY_SUMMARY_MAX_CHARS_PER_CHUNK:6000}
platform.memory.short-term.summary.max-words=${PLATFORM_MEMORY_SUMMARY_MAX_WORDS:180}
platform.memory.redis.enabled=${PLATFORM_MEMORY_REDIS_ENABLED:true}
platform.memory.redis.ttl-hours=${PLATFORM_MEMORY_REDIS_TTL_HOURS:24}
platform.memory.long-term.extraction.provider=${PLATFORM_MEMORY_LONG_TERM_EXTRACTION_PROVIDER:gemini}
platform.memory.long-term.extraction.model=${PLATFORM_MEMORY_LONG_TERM_EXTRACTION_MODEL:gemini-3-flash-preview}
platform.memory.long-term.extraction-version=${PLATFORM_MEMORY_LONG_TERM_EXTRACTION_VERSION:v1}
platform.memory.long-term.max-attempts=${PLATFORM_MEMORY_LONG_TERM_MAX_ATTEMPTS:3}
platform.memory.long-term.turn-interval=${PLATFORM_MEMORY_LONG_TERM_TURN_INTERVAL:5}
platform.memory.long-term.max-context-messages=${PLATFORM_MEMORY_LONG_TERM_MAX_CONTEXT_MESSAGES:24}
platform.upload.redis-state-enabled=${PLATFORM_UPLOAD_REDIS_STATE_ENABLED:true}
platform.upload.max-chunk-size-bytes=${PLATFORM_UPLOAD_MAX_CHUNK_SIZE_BYTES:8388608}
platform.upload.session-ttl-hours=${PLATFORM_UPLOAD_SESSION_TTL_HOURS:24}
platform.ingest.max-attempts=${PLATFORM_INGEST_MAX_ATTEMPTS:3}
platform.ingest.stale-running-minutes=${PLATFORM_INGEST_STALE_RUNNING_MINUTES:15}
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
platform.model.default-provider=${MODEL_PROVIDER:gemini}
# Deprecated: the chat runtime no longer issues a separate router-model call.
platform.model.router.enabled=${ROUTER_MODEL_ENABLED:true}
# Deprecated and ignored.
platform.model.router.provider=${ROUTER_MODEL_PROVIDER:${MODEL_PROVIDER:gemini}}
# Deprecated and ignored.
platform.model.router.model=${ROUTER_MODEL:}
platform.chat.tool-assisted.max-tool-calls=${CHAT_TOOL_ASSISTED_MAX_TOOL_CALLS:4}
platform.chat.tool-assisted.max-search-calls=${CHAT_TOOL_ASSISTED_MAX_SEARCH_CALLS:2}
platform.chat.tool-assisted.max-fetch-calls=${CHAT_TOOL_ASSISTED_MAX_FETCH_CALLS:2}
platform.chat.tool-assisted.min-verified-sources=${CHAT_TOOL_ASSISTED_MIN_VERIFIED_SOURCES:1}
platform.chat.tool-assisted.timeout-ms=${CHAT_TOOL_ASSISTED_TIMEOUT_MS:30000}
platform.model.providers.gemini.enabled=${GEMINI_ENABLED:true}
platform.model.providers.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com}
platform.model.providers.gemini.api-key=${GOOGLE_API_KEY:}
platform.model.providers.gemini.model=${GEMINI_MODEL:gemini-3-pro-preview}
platform.model.providers.openai.enabled=${OPENAI_ENABLED:false}
platform.model.providers.openai.base-url=${OPENAI_BASE_URL:https://api.openai.com/v1}
platform.model.providers.openai.api-key=${OPENAI_API_KEY:}
platform.model.providers.openai.model=${OPENAI_MODEL:gpt-4.1-mini}
platform.model.providers.deepseek.enabled=${DEEPSEEK_ENABLED:false}
platform.model.providers.deepseek.base-url=${DEEPSEEK_BASE_URL:https://api.deepseek.com}
platform.model.providers.deepseek.api-key=${DEEPSEEK_API_KEY:}
platform.model.providers.deepseek.model=${DEEPSEEK_MODEL:deepseek-chat}
platform.ai.gemini.api-key=${GOOGLE_API_KEY:}
platform.ai.gemini.model=${GEMINI_MODEL:gemini-3-pro-preview}
platform.ai.execution.impl=${PLATFORM_AI_EXECUTION_IMPL:legacy}
platform.tools.python-command=${PYTHON_COMMAND:python}
platform.tools.document-script=./tools/document_tools.py
platform.tools.timeout-seconds=30
platform.tools.web.provider=${WEB_SEARCH_PROVIDER:auto}
platform.tools.web.search-api-base-url=${WEB_SEARCH_API_BASE_URL:https://api.duckduckgo.com/}
platform.tools.web.tavily-api-key=${TAVILY_API_KEY:}
platform.tools.web.user-agent=${WEB_SEARCH_USER_AGENT:Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/133.0.0.0 Safari/537.36}
platform.tools.web.timeout-seconds=${WEB_SEARCH_TIMEOUT_SECONDS:20}
platform.tools.web.max-results=${WEB_SEARCH_MAX_RESULTS:5}
platform.debug.log-prompts=false
platform.debug.log-agent-flow=true
platform.debug.log-model-responses=false
spring.servlet.multipart.max-file-size=${SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE:16MB}
spring.servlet.multipart.max-request-size=${SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE:32MB}
